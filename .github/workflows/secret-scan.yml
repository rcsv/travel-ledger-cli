name: Secret Scan

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog (verified, non-blocking)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Scans only commits in this push/PR (default action behavior).
      # --results=verified limits noise; continue-on-error keeps CI unblocked
      # while we gather operational experience (see trufflehog.yaml).
      - name: Scan for leaked credentials
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --config=trufflehog.yaml --results=verified
