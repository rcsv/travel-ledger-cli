name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux-amd64
            archive_ext: tar.gz
            binary: caglla-cli
          - os: macos-latest
            asset_name: macos-arm64
            archive_ext: tar.gz
            binary: caglla-cli
          - os: windows-latest
            asset_name: windows-amd64
            archive_ext: zip
            binary: caglla-cli.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Show runner architecture
        if: matrix.os == 'macos-latest'
        run: uname -m

      - name: Build release binary
        run: cargo build --release

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="caglla-cli-${version}-${{ matrix.asset_name }}.tar.gz"
          tar -czf "$asset" -C target/release "${{ matrix.binary }}"
          echo "ASSET_PATH=$asset" >> "$GITHUB_ENV"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".Substring(1)
          $asset = "caglla-cli-$version-${{ matrix.asset_name }}.zip"
          Compress-Archive -Path "target/release/${{ matrix.binary }}" -DestinationPath $asset
          "ASSET_PATH=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ASSET_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
