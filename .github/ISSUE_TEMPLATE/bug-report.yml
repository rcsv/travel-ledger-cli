name: Bug Report
description: 不具合報告
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: 症状
      description: 何が期待と異なるか
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 再現手順
      placeholder: |
        1. cargo run -- trip add "test" ...
        2. cargo run -- ...
        3. エラー / 想定外の出力
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: バージョン
      description: `travel-ledger-cli --version` または git tag
      placeholder: v1.23.0
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
        - other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: ログ / エラーメッセージ
      render: shell
    validations:
      required: false
